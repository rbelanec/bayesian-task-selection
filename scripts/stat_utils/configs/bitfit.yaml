seed: 123

### model
model_name_or_path: meta-llama/Meta-Llama-3-8B-Instruct
trust_remote_code: true
flash_attn: auto
use_cache: false

### method
stage: sft
do_train: false
finetuning_type: bitfit
task_type: CAUSAL_LM

### dataset
template: llama3
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2
packing: false

### output
logging_steps: 5
save_steps: 0.05
overwrite_output_dir: true
save_only_model: false
plot_loss: true
include_num_input_tokens_seen: true
push_to_hub: false
save_total_limit: 1

### train
per_device_train_batch_size: 2
learning_rate: 5.0e-5
num_train_epochs: 10
weight_decay: 1.0e-5
lr_scheduler_type: cosine
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
warmup_ratio: 0.1
optim: adamw_torch
report_to:
- wandb

### eval
do_eval: false
per_device_eval_batch_size: 2

### predict
do_predict: false
predict_with_generate: false
temperature: null
top_k: null
top_p: null
do_sample: false
