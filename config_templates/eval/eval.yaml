seed: 42

### model
model_name_or_path: dummy_model_name_or_path
trust_remote_code: true
flash_attn: auto
use_cache: false

### method
stage: sft
do_train: false
finetuning_type: lora
lora_rank: 8
lora_alpha: 8
lora_dropout: 0.05
lora_target: k_proj,v_proj

### dataset
# eval_dataset: mnli_eval
template: llama3
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 4
packing: false

### output
output_dir: dummy_output_dir
logging_steps: 5
save_steps: 0.05
plot_loss: true
overwrite_output_dir: true
save_only_model: false
include_num_input_tokens_seen: true
save_total_limit: 1

### train
per_device_train_batch_size: 8
learning_rate: 5.0e-5
num_train_epochs: 5
weight_decay: 1.0e-5
lr_scheduler_type: cosine
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
warmup_ratio: 0.1
optim: adamw_torch
report_to:
- none

### eval
per_device_eval_batch_size: 32
compute_classification_metrics: true

### predict
temperature: null
top_k: null
top_p: null
do_sample: false
max_new_tokens: 16