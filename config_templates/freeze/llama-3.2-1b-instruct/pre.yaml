seed: ${SEED}

### model
model_name_or_path: meta-llama/Llama-3.2-1B-Instruct
trust_remote_code: true
flash_attn: auto
use_cache: false

### method
# EPOCHS=0 snapshot of the init used as the task-vector pretrained reference.
# finetuning_type matches the train config (freeze) so the saved checkpoint is a full
# model.safetensors, identical in format to base. Since EPOCHS=0 no step runs, so the
# weights are byte-identical to the base pretrained snapshot; you can symlink
# saves_pretrained_weights/base/.../pretrained_weights_${SEED} here instead of regenerating.
stage: sft
do_train: true
finetuning_type: freeze
freeze_trainable_layers: 16
freeze_trainable_modules: all

### dataset
dataset: ${DATASET}
template: llama3
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 4
packing: false

### output
output_dir: ${OUTPUT_DIR}
logging_steps: 5
save_steps: 0.05
overwrite_output_dir: true
save_only_model: false
plot_loss: true
include_num_input_tokens_seen: true
load_best_model_at_end: false
save_total_limit: 1

### train
per_device_train_batch_size: 8
learning_rate: 5.0e-6
num_train_epochs: ${EPOCHS}
weight_decay: 1.0e-5
lr_scheduler_type: cosine
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
warmup_ratio: 0.1
optim: adamw_torch
report_to:
- none

### eval
per_device_eval_batch_size: 8
eval_strategy: 'no'
do_eval: false
