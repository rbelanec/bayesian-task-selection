seed: ${SEED}

### model
model_name_or_path: meta-llama/Llama-3.1-8B-Instruct
trust_remote_code: true
flash_attn: auto
use_cache: false

### method
stage: sft
do_train: true
finetuning_type: full
# Full FT of 8B OOMs on a single 140GB H200 (~128GB static: 16 weights + 16 grads
# + 96 AdamW fp32 master+m+v). ZeRO-2 shards optimizer states + grads across the GPUs
# requested in the SLURM script (--gres=gpu:2), keeping adamw_torch identical to the
# 1B/3B runs. Path is relative to the repo root (the cwd of llamafactory-cli).
deepspeed: config_templates/deepspeed/ds_z2_config.json

### dataset
dataset: ${DATASET}
template: llama3
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 4
packing: false

### output
output_dir: ${OUTPUT_DIR}
logging_steps: 5
save_steps: 0.05
overwrite_output_dir: true
save_only_model: false
plot_loss: true
include_num_input_tokens_seen: true
push_to_hub: false
load_best_model_at_end: true
save_total_limit: 1

### train
per_device_train_batch_size: 8
learning_rate: 2.0e-6
num_train_epochs: 1
weight_decay: 1.0e-2
lr_scheduler_type: cosine
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
warmup_ratio: 0.1
optim: adamw_torch
report_to:
- wandb
run_name: ${WANDB_NAME}

### eval
per_device_eval_batch_size: 8
eval_strategy: steps
eval_steps: 0.05
val_size: 0.1